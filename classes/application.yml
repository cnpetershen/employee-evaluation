file:
  upload-dir: ./uploads


mybatis:
  mapper-locations: classpath*:mapper/*.xml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
#  packages-to-scan: com.example.demo
  paths-to-match: /api/**
  security:
    - name: BearerAuth
      type: http
      scheme: bearer
      bearerFormat: JWT


