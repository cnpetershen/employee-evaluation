spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sm?characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: '1234'  # 注意：密码是数字时，建议用引号包裹
    driver-class-name: com.mysql.cj.jdbc.Driver

  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

